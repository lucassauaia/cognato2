services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paperclip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paperclip}
      POSTGRES_DB: ${POSTGRES_DB:-paperclip}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cognato
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperclip} -d ${POSTGRES_DB:-paperclip}"]
      interval: 2s
      timeout: 5s
      retries: 30

  paperclip:
    image: ghcr.io/lucassauaia/cognato/paperclip:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://paperclip:paperclip@db:5432/paperclip}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - paperclip_home:/paperclip
      - plugins_data:/paperclip/.paperclip/plugins
    networks:
      - cognato
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - openclaw_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cognato
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"

  hermes:
    image: nousresearch/hermes-agent
    restart: unless-stopped
    command: ["gateway", "run"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - hermes_data:/opt/data
    networks:
      - cognato
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'hermes gateway' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${HERMES_PORT:-8642}:8642"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    command: >
      caddy reverse-proxy
      --from ${CADDY_DOMAIN:-localhost}
      --to paperclip:3100
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - cognato
    depends_on:
      paperclip:
        condition: service_healthy
    profiles:
      - production

volumes:
  pgdata:
  paperclip_home:
  plugins_data:
  openclaw_data:
  hermes_data:
  caddy_data:
  caddy_config:

networks:
  cognato:
    driver: bridge