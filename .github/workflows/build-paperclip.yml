name: Build & Push Paperclip (amd64)

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-paperclip.yml
      - patches/the-office-feature.patch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout cognato
        uses: actions/checkout@v4

      - name: Checkout paperclip source
        uses: actions/checkout@v4
        with:
          repository: paperclipai/paperclip
          path: services/paperclip

      - name: Apply cognato patches (The Office feature + python3-setuptools fix)
        run: |
          git -C services/paperclip apply "$GITHUB_WORKSPACE/patches/the-office-feature.patch"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: lucassauaia
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/paperclip
          platforms: linux/amd64
          push: true
          tags: ghcr.io/lucassauaia/cognato/paperclip:latest
