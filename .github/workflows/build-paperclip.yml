name: Build & Push Paperclip (amd64)

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-paperclip.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout cognato2
        uses: actions/checkout@v4

      - name: Checkout paperclip source
        uses: actions/checkout@v4
        with:
          repository: paperclipai/paperclip
          path: services/paperclip

      - name: Patch Dockerfile (python3-setuptools for node-gyp)
        run: |
          sed -i 's/python3 \\/python3 python3-setuptools \\/' services/paperclip/Dockerfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: lucassauaia
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/paperclip
          platforms: linux/amd64
          push: true
          tags: ghcr.io/lucassauaia/cognato2/paperclip:latest
